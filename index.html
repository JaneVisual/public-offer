<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Публичная оферта</title>

<style>
body {
    margin: 0;
    background: #f3f3f3;
    font-family: Arial, sans-serif;
    color: #222;
}

.wrapper {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
}

.header {
    background: white;
    padding: 35px 45px;
    margin-bottom: 25px;
    box-shadow: 0 0 18px rgba(0,0,0,.08);
    border-radius: 6px;
}

h1 {
    margin: 0 0 10px;
    font-size: 30px;
}

p {
    margin: 0;
    font-size: 16px;
    line-height: 1.6;
}

.button {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 20px;
    background: #222;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    font-size: 15px;
}

.pdf-box {
    background: white;
    padding: 20px;
    box-shadow: 0 0 18px rgba(0,0,0,.08);
    border-radius: 6px;
}

iframe {
    width: 100%;
    height: 900px;
    border: none;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="header">
        <h1>Публичная оферта</h1>
        <p>Актуальная редакция документа доступна для ознакомления ниже.</p>
        <a class="button" href="offer.pdf" target="_blank">Открыть PDF</a>
    </div>

    <div class="pdf-box">
        <iframe src="offer.pdf"></iframe>
    </div>

</div>

</body>
</html>
